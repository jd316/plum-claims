name: CD

# Runs after CI succeeds on main: build images -> push to GHCR -> deploy to EC2 via SSM.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

concurrency:
  group: cd-production
  cancel-in-progress: false

permissions:
  contents: read
  packages: write     # push images to GHCR
  id-token: write     # OIDC -> assume the AWS deploy role

env:
  AWS_REGION: us-east-1
  INSTANCE_ID: i-0dde1c8a90d97be63
  DEPLOY_ROLE: arn:aws:iam::505875807998:role/plum-claims-gha-deploy
  BACKEND_IMAGE: ghcr.io/jd316/plum-claims-backend
  FRONTEND_IMAGE: ghcr.io/jd316/plum-claims-frontend

jobs:
  deploy:
    name: build · push · deploy
    runs-on: ubuntu-latest
    # only deploy a commit whose CI passed
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Compute image tag (the CI-validated commit)
        id: vars
        env:
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: echo "tag=$(printf '%s' "$HEAD_SHA" | cut -c1-12)" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ steps.vars.outputs.tag }}
            ${{ env.BACKEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ steps.vars.outputs.tag }}
            ${{ env.FRONTEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.DEPLOY_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to EC2 via SSM
        run: |
          set -euo pipefail
          TAG="${{ steps.vars.outputs.tag }}"
          CMD=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name AWS-RunShellScript \
            --comment "CD deploy $TAG" \
            --parameters commands="cd /opt/plum-claims && git fetch --quiet origin main && git reset --hard --quiet origin/main && TAG=$TAG bash scripts/deploy.sh" \
            --query "Command.CommandId" --output text)
          echo "SSM command: $CMD"
          aws ssm wait command-executed --command-id "$CMD" --instance-id "$INSTANCE_ID" || true
          echo "----- deploy output -----"
          aws ssm get-command-invocation --command-id "$CMD" --instance-id "$INSTANCE_ID" \
            --query "StandardOutputContent" --output text
          ERR=$(aws ssm get-command-invocation --command-id "$CMD" --instance-id "$INSTANCE_ID" --query "StandardErrorContent" --output text)
          STATUS=$(aws ssm get-command-invocation --command-id "$CMD" --instance-id "$INSTANCE_ID" --query "Status" --output text)
          echo "----- status: $STATUS -----"
          [ -n "$ERR" ] && echo "stderr: $ERR" || true
          [ "$STATUS" = "Success" ] || { echo "Deploy failed"; exit 1; }
