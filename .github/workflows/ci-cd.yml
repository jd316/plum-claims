name: CI/CD

on:
  pull_request:
  push:
    branches: [main]

# One run per branch: a newer push cancels the older in-progress run (so we never
# build/test/deploy a superseded commit, and two deploys never run at once).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend (lint · types · tests)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: plum
          POSTGRES_PASSWORD: plum
          POSTGRES_DB: claims
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U plum"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: backend
    env:
      # Tests redirect to <db>_test via conftest; plum is superuser so it can create it.
      DATABASE_URL: postgresql+psycopg://plum:plum@localhost:5432/claims
      APP_ENV: development
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.lock
          # ".[dev]" pulls the test toolchain (pytest, pytest-timeout, httpx, hypothesis)
          # — these live in the optional dev extra, not requirements.lock (runtime only).
          pip install -e ".[dev]"
          pip install ruff pyright
      - name: Lint (ruff)
        run: ruff check .
      - name: Type-check (pyright)
        run: pyright
      - name: Tests (deterministic; live Gemini tests excluded)
        run: pytest -m "not live" -q

  frontend:
    name: frontend (types · lint · build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Type-check
        run: npx tsc -b --noEmit
      - name: Lint
        run: npx eslint src
      - name: Build
        run: npm run build

  security-scan:
    name: security (trivy vuln scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Supply-chain / vulnerability scan of the repo: Python (requirements.lock) and
      # npm (package-lock.json) dependencies plus Dockerfile/compose misconfigurations.
      # Non-blocking by design (exit-code 0): base images carry unfixable CVEs, so we
      # REPORT high/critical FIXABLE issues in the job log without failing the pipeline.
      # Tighten exit-code to 1 once the surfaced findings are triaged.
      - name: Trivy scan (deps + IaC, fixable HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "0"
          format: table

  # CD: build images -> push to GHCR -> deploy to EC2 via OIDC+SSM. Gated on the test
  # jobs and limited to pushes on main, so it shows as a commit check ("CI / deploy")
  # AND never deploys a red commit or a PR.
  deploy:
    name: deploy
    needs: [backend, frontend, security-scan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      packages: write     # push images to GHCR
      id-token: write     # OIDC -> assume the AWS deploy role
    env:
      AWS_REGION: us-east-1
      INSTANCE_ID: i-0dde1c8a90d97be63
      DEPLOY_ROLE: arn:aws:iam::505875807998:role/plum-claims-gha-deploy
      BACKEND_IMAGE: ghcr.io/jd316/plum-claims-backend
      FRONTEND_IMAGE: ghcr.io/jd316/plum-claims-frontend
    steps:
      - uses: actions/checkout@v4
      - name: Compute image tag
        id: vars
        run: echo "tag=$(printf '%s' "$GITHUB_SHA" | cut -c1-12)" >> "$GITHUB_OUTPUT"
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build & push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ steps.vars.outputs.tag }}
            ${{ env.BACKEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build & push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ steps.vars.outputs.tag }}
            ${{ env.FRONTEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Keep the registry tidy: retain the 10 most recent versions of each image
      # (covers the current deploy + recent SHAs for rollback) and delete older ones.
      - name: Prune old backend image versions
        uses: actions/delete-package-versions@v5
        with:
          package-name: plum-claims-backend
          package-type: container
          min-versions-to-keep: 10
      - name: Prune old frontend image versions
        uses: actions/delete-package-versions@v5
        with:
          package-name: plum-claims-frontend
          package-type: container
          min-versions-to-keep: 10

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.DEPLOY_ROLE }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Deploy to EC2 via SSM
        run: |
          set -euo pipefail
          TAG="${{ steps.vars.outputs.tag }}"
          CMD=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name AWS-RunShellScript \
            --comment "CD deploy $TAG" \
            --timeout-seconds 600 \
            --parameters commands="cd /opt/plum-claims && git fetch --quiet origin main && git reset --hard --quiet origin/main && TAG=$TAG bash scripts/deploy.sh" \
            --query "Command.CommandId" --output text)
          echo "SSM command: $CMD"
          for i in $(seq 1 72); do
            STATUS=$(aws ssm get-command-invocation --command-id "$CMD" --instance-id "$INSTANCE_ID" --query "Status" --output text 2>/dev/null || echo Pending)
            printf '  [%ds] %s\n' "$((i*10))" "$STATUS"
            case "$STATUS" in Success|Failed|Cancelled|TimedOut) break ;; esac
            sleep 10
          done
          echo "----- deploy output -----"
          aws ssm get-command-invocation --command-id "$CMD" --instance-id "$INSTANCE_ID" --query "StandardOutputContent" --output text
          ERR=$(aws ssm get-command-invocation --command-id "$CMD" --instance-id "$INSTANCE_ID" --query "StandardErrorContent" --output text)
          [ -n "$ERR" ] && echo "----- stderr -----" && echo "$ERR" || true
          echo "----- status: $STATUS -----"
          [ "$STATUS" = "Success" ] || { echo "Deploy failed"; exit 1; }
