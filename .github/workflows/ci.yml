name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    name: backend (lint · types · tests)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: plum
          POSTGRES_PASSWORD: plum
          POSTGRES_DB: claims
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U plum"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: backend
    env:
      # Tests redirect to <db>_test via conftest; plum is superuser so it can create it.
      DATABASE_URL: postgresql+psycopg://plum:plum@localhost:5432/claims
      APP_ENV: development
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.lock
          pip install -e .
          pip install ruff pyright
      - name: Lint (ruff)
        run: ruff check .
      - name: Type-check (pyright)
        run: pyright
      - name: Tests (deterministic; live Gemini tests excluded)
        run: pytest -m "not live" -q

  frontend:
    name: frontend (types · lint · build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Type-check
        run: npx tsc -b --noEmit
      - name: Lint
        run: npx eslint src
      - name: Build
        run: npm run build
