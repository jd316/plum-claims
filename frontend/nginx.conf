# Cache policy by path, evaluated at response time. Done via map (not per-location
# add_header) so it doesn't trip nginx's add_header inheritance rule — a location with
# its own add_header drops ALL inherited headers, which would silently kill the security
# headers below. Vite's content-hashed /assets/* are immutable; everything else (notably
# index.html) must re-validate so a redeploy is picked up immediately.
map $uri $cache_control {
  default        "no-cache";
  ~^/assets/     "public, max-age=31536000, immutable";
}

server {
  # Non-root (unprivileged) nginx binds 8080; Compose publishes it as host :80.
  listen 8080;
  server_tokens off;
  client_max_body_size 25m;          # medical bills/scans (PDF/JPEG) exceed nginx's 1m default
  root /usr/share/nginx/html;

  gzip on;
  gzip_comp_level 5;
  gzip_min_length 1024;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;

  # Applied to every response (no sub-location defines add_header, so these are inherited).
  add_header X-Content-Type-Options nosniff always;
  add_header X-Frame-Options DENY always;
  add_header Referrer-Policy strict-origin-when-cross-origin always;
  add_header Cache-Control $cache_control always;
  # Content-Security-Policy: tightened for this self-contained SPA. Allowances are
  # deliberate and minimal — Google Fonts (style+font), `blob:` for the in-app document
  # viewer (image blob URLs + the PDF <embed>, governed by img-src/object-src), and
  # inline style attributes (the viewer's zoom/rotate transforms) via 'unsafe-inline'
  # on style-src only (NOT script-src). connect-src 'self' because /api is same-origin.
  add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob:; object-src 'self' blob:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
  # HSTS: browsers ignore it over plain HTTP and enforce it once served via the TLS
  # overlay (Caddy). 2 years + includeSubDomains.
  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
  # Disable powerful browser features the app never uses.
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;

  location /api/ {
    # Re-resolve the backend via Docker's embedded DNS (127.0.0.11) on a short TTL, using
    # a variable upstream. Without this, nginx resolves backend ONCE at startup and caches
    # the IP — so redeploying the backend (`docker compose up -d --build` recreates it with
    # a new IP, but leaves the unchanged frontend running) would 502 until the frontend is
    # restarted. The variable form forwards the original URI unchanged (no path rewrite).
    resolver 127.0.0.11 ipv6=off valid=10s;
    set $api_upstream http://backend:8000;
    proxy_pass $api_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 600s;          # vision/LLM calls can run long; default 60s would 504
    proxy_send_timeout 600s;
  }

  location / { try_files $uri /index.html; }
}
